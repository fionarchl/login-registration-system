spring.application.name=auth-demo-test

# ── JPA + H2 (test) ──
spring.datasource.url=jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=false
spring.h2.console.enabled=false

# ── JWT ──
app.jwt.secret=YXV0aC1kZW1vLWp3dC1zZWNyZXQta2V5LWZvci1obWFjLXNoYTUxMi1tdXN0LWJlLWF0LWxlYXN0LXNpeHR5LWZvdXItYnl0ZXMtbG9uZy1taW5pbXVt
app.jwt.access-token-expiry-ms=900000
app.jwt.refresh-token-expiry-ms=604800000

# ── Rate Limiting (raised for tests) ──
app.rate-limit.login.max-attempts=100
app.rate-limit.login.window-seconds=60

# ── Account Lockout ──
app.lockout.max-attempts=5
app.lockout.duration-minutes=15

# ── Email Verification ──
app.mail.verification-enabled=false
app.verification.base-url=http://localhost:8080
app.verification.token-expiry-hours=24

# ── Logging (quieter during tests) ──
logging.level.com.auth.demo=WARN
