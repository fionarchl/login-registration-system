spring.application.name=auth-demo
server.port=8080

# ── JPA + H2 (development) ──
spring.datasource.url=jdbc:h2:mem:authdb;DB_CLOSE_DELAY=-1
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=false
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# ── JWT ──
# IMPORTANT: Replace this secret with a secure random value in production!
app.jwt.secret=YXV0aC1kZW1vLWp3dC1zZWNyZXQta2V5LWZvci1obWFjLXNoYTUxMi1tdXN0LWJlLWF0LWxlYXN0LXNpeHR5LWZvdXItYnl0ZXMtbG9uZy1taW5pbXVt
app.jwt.access-token-expiry-ms=900000
app.jwt.refresh-token-expiry-ms=604800000

# ── Rate Limiting ──
app.rate-limit.login.max-attempts=5
app.rate-limit.login.window-seconds=60

# ── Account Lockout ──
app.lockout.max-attempts=5
app.lockout.duration-minutes=15

# ── Email Verification ──
app.mail.verification-enabled=false
app.verification.base-url=http://localhost:8080
app.verification.token-expiry-hours=24

# ── Logging ──
logging.level.com.auth.demo=INFO
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n
